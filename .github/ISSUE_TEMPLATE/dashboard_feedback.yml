name: YGPT Dashboard Feedback
description: Collect structured feedback
title: "[Dashboard Feedback]: "

body:
  - type: input
    id: name
    attributes:
      label: Name
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Role
      options:
        - Regional Coordinator
        - Events Team
        - Leadership
        - Other
    validations:
      required: true

  - type: textarea
    id: usage
    attributes:
      label: What were you trying to do?
      placeholder: Describe your task
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of Feedback
      options:
        - Bug
        - UI Issue
        - UX Issue
        - Feature Request
        - General Feedback
    validations:
      required: true

  - type: textarea
    id: issues
    attributes:
      label: Issues faced
      placeholder: Describe problems

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true