name: YGPT Dashboard Feedback
description: Collect structured feedback on the new dashboard
title: "[Dashboard Feedback]: "
labels: ["feedback"]

body:

  - type: markdown
    attributes:
      value: |
        ## YGPT Dashboard Feedback
        Please share your experience with the new dashboard.

  - type: input
    id: stakeholder_name
    attributes:
      label: Name
      placeholder: Your name
    validations:
      required: true

  - type: dropdown
    id: stakeholder_role
    attributes:
      label: Your Role
      options:
        - Regional Coordinator
        - Events Team
        - Leadership
        - "Finance & Accounts"
        - Other
    validations:
      required: true

  - type: textarea
    id: usage_context
    attributes:
      label: What were you trying to do?
      description: Describe the task or goal you had while using the dashboard
      placeholder: Example: Checking analytics, managing users
    validations:
      required: true

  - type: dropdown
    id: feedback_type
    attributes:
      label: Type of Feedback
      description: Select the category that best fits
      options:
        - Bug
        - UI Issue
        - UX Issue
        - Feature Request
        - Performance Issue
        - General Feedback
    validations:
      required: true

  - type: textarea
    id: liked
    attributes:
      label: What worked well?
      placeholder: What did you like or find useful?

  - type: textarea
    id: issues
    attributes:
      label: What did not work well?
      description: Bugs, confusion, missing features
      placeholder: Be specific

  - type: dropdown
    id: usability_rating
    attributes:
      label: Overall Usability
      options:
        - Excellent
        - Good
        - Average
        - Poor
        - Very Poor
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: suggestions
    attributes:
      label: Suggestions
      placeholder: What would make this better?

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag and drop images if helpful

  - type: checkboxes
    id: followup
    attributes:
      label: Follow-up
      options:
        - label: I am open to a follow-up discussion